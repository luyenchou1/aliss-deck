<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ALISS — Agentic memory for dynamic businesses</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --paper: #ffffff;
    --paper-edge: #f3f0e8;
    --ink: #1a1a1a;
    --ink-soft: #3a3633;
    --ink-muted: #6b6258;
    --ink-faint: #a39782;
    --accent: #f0a830;
    --accent-wash: rgba(240, 168, 48, 0.32);
    --accent-deep: #c47a18;
    --rule: #d6cdb6;
    --grid-dot: rgba(60, 50, 30, 0.18);
    --grid-size: 22px;
    --serif: "Source Serif 4", "Iowan Old Style", Georgia, serif;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: #2a2520;
    color: var(--ink);
    font-family: var(--sans);
    font-size: 17px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* Page chrome — every "slide" is a notebook page */
  .page {
    max-width: 1080px;
    margin: 32px auto;
    background: var(--paper);
    background-image:
      radial-gradient(circle at 1px 1px, var(--grid-dot) 1px, transparent 1.4px);
    background-size: var(--grid-size) var(--grid-size);
    background-position: 22px 22px;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.4) inset,
      0 30px 60px -20px rgba(0,0,0,0.55),
      0 8px 24px -8px rgba(0,0,0,0.35);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
  }

  .page-inner {
    padding: 88px 96px 96px 96px;
    position: relative;
    z-index: 2;
  }

  /* Section number & label up top */
  .page-meta {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 36px;
    padding-bottom: 14px;
  }
  .page-num {
    font-family: var(--serif);
    font-size: 52px;
    line-height: 1;
    font-weight: 700;
    letter-spacing: -0.015em;
    color: var(--ink);
  }
  .page-tag {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }

  /* Headlines */
  h1.eyebrow, .eyebrow {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent-deep);
    margin: 0 0 16px 0;
  }

  h1.headline {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 52px;
    line-height: 1.08;
    letter-spacing: -0.015em;
    margin: 0 0 28px 0;
    color: var(--ink);
    max-width: 100%;
  }
  h1.headline em { font-style: italic; }

  h2.subhead {
    font-family: var(--serif);
    font-weight: 400;
    font-style: italic;
    font-size: 22px;
    line-height: 1.4;
    color: var(--ink-soft);
    margin: 0 0 32px 0;
    max-width: 720px;
    text-wrap: pretty;
  }

  p.body {
    font-family: var(--sans);
    font-size: 17px;
    line-height: 1.65;
    color: var(--ink-soft);
    margin: 0 0 18px 0;
    max-width: 100%;
    text-wrap: pretty;
  }

  p.body.lead {
    font-family: var(--serif);
    font-size: 21px;
    line-height: 1.55;
    color: var(--ink);
    max-width: 100%;
  }

  /* The accent — orange marker highlight */
  .hl {
    background: linear-gradient(180deg, transparent 12%, var(--accent-wash) 12%, var(--accent-wash) 88%, transparent 88%);
    padding: 0 2px;
    box-decoration-break: clone;
    -webkit-box-decoration-break: clone;
  }
  .hl-strong {
    background: var(--accent-wash);
    padding: 1px 6px;
    border-radius: 2px;
    font-weight: 500;
  }

  /* Inline ink elements */
  .ink-rule {
    height: 1px;
    background: var(--rule);
    margin: 36px 0;
    border: 0;
  }
  .ink-rule.short { width: 80px; background: var(--ink); height: 1.5px; }

  /* ============================ Tweaks panel positioning ============================ */
  #tweaks-root { position: fixed; bottom: 24px; right: 24px; z-index: 1000; }

  /* ============================ Hero / Slide 1 specific ============================ */
  .hero-mast {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    margin-bottom: 24px;
  }
  .hero-mast .deck-title {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .hero-mast .deck-sub {
    font-family: var(--serif);
    font-style: italic;
    font-size: 14px;
    color: var(--ink-muted);
  }

  /* ============================ Hand-drawn illustration frame ============================ */
  .illo {
    position: relative;
    margin: 28px 0 12px;
    padding: 14px;
  }
  .illo-inner {
    position: relative;
    z-index: 1;
  }
  .illo-inner img {
    display: block;
    width: 100%;
    height: auto;
  }
  .illo-pen {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 2;
  }
  .illo-pen path {
    fill: none;
    stroke: var(--ink);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .prompt-box {
    background: rgba(255, 252, 240, 0.65);
    border-left: 3px solid var(--accent);
    padding: 16px 20px;
    margin-top: 18px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.6;
    color: var(--ink-soft);
    border-radius: 0 2px 2px 0;
  }
  .prompt-box .prompt-label {
    display: block;
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent-deep);
    margin-bottom: 8px;
  }
  .prompt-box .prompt-copy-btn {
    float: right;
    background: transparent;
    border: 1px solid var(--ink-faint);
    color: var(--ink-muted);
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 9px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s ease;
  }
  .prompt-box .prompt-copy-btn:hover {
    border-color: var(--ink);
    color: var(--ink);
    background: rgba(255,255,255,0.5);
  }

  .placeholder-art {
    aspect-ratio: 16 / 9;
    background:
      repeating-linear-gradient(
        45deg,
        transparent,
        transparent 10px,
        rgba(60, 50, 30, 0.06) 10px,
        rgba(60, 50, 30, 0.06) 11px
      );
    border: 1px dashed var(--ink-faint);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    color: var(--ink-muted);
    font-family: var(--serif);
    font-style: italic;
    font-size: 15px;
    text-align: center;
    padding: 32px;
  }
  .placeholder-art .ph-icon {
    font-family: var(--serif);
    font-size: 36px;
    color: var(--ink-faint);
  }

  /* ============================ Slide 3 — architecture components ============================ */
  .component {
    display: grid;
    grid-template-columns: 72px 1fr;
    gap: 16px;
    align-items: start;
  }
  .component-icon {
    width: 72px;
    height: 72px;
    object-fit: contain;
    margin-top: 2px;
    transform: rotate(-1.2deg);
  }
  .component:nth-child(2) .component-icon { transform: rotate(1deg); }
  .component:nth-child(3) .component-icon { transform: rotate(-0.6deg); }
  .component:nth-child(4) .component-icon { transform: rotate(1.4deg); }

  /* ============================ Slide 2 — four principles ============================ */
  .principles {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px 48px;
    margin-top: 12px;
  }
  .principle {
    display: grid;
    grid-template-columns: 56px 1fr;
    gap: 18px;
    align-items: start;
  }
  .principle-num {
    font-family: var(--serif);
    font-size: 32px;
    line-height: 1;
    font-weight: 500;
    color: var(--ink);
    position: relative;
    padding-top: 4px;
  }
  .principle-num::after {
    content: "";
    position: absolute;
    inset: -2px -4px -2px -4px;
    background: var(--accent-wash);
    z-index: -1;
    border-radius: 2px;
    transform: rotate(-1deg);
  }
  .principle-title {
    font-family: var(--serif);
    font-size: 19px;
    font-weight: 600;
    color: var(--ink);
    margin: 0 0 6px 0;
    line-height: 1.3;
  }
  .principle-body {
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.55;
    color: var(--ink-soft);
    margin: 0;
  }
  .principle-map {
    margin-top: 36px;
    padding: 20px 24px;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    background: rgba(255,252,240,0.4);
  }
  .principle-map-label {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent-deep);
    margin-bottom: 12px;
  }
  .principle-map ul {
    list-style: none;
    margin: 0; padding: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 24px;
  }
  .principle-map li {
    font-family: var(--serif);
    font-size: 14px;
    color: var(--ink-soft);
    font-style: italic;
  }
  .principle-map li b {
    font-family: var(--sans);
    font-style: normal;
    font-weight: 600;
    color: var(--ink);
    margin-right: 6px;
  }
  .principle-map .arrow {
    color: var(--accent-deep);
    margin: 0 4px;
  }

  /* ============================ Slide 1b — the gaps ============================ */
  .gaps {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 28px 32px;
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid var(--rule);
  }
  .gap {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .gap-label {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-muted);
  }
  .gap-title {
    font-family: var(--serif);
    font-size: 19px;
    font-weight: 500;
    line-height: 1.25;
    color: var(--ink);
    margin: 0;
  }
  .gap-body {
    font-family: var(--sans);
    font-size: 14.5px;
    line-height: 1.55;
    color: var(--ink-muted);
    margin: 0;
  }

  /* ============================ Slide 5 — comparison ============================ */
  .compare-block { margin-top: 28px; }
  .compare-block + .compare-block {
    margin-top: 56px;
    padding-top: 48px;
    border-top: 1px solid var(--rule);
  }
  .compare-prompt {
    font-family: var(--serif);
    font-style: italic;
    font-size: 18px;
    color: var(--ink);
    padding: 14px 0 20px 0;
    margin: 0 0 24px 0;
    border-bottom: 1px solid var(--rule);
  }
  .compare-prompt::before {
    content: "Prompt — ";
    font-family: var(--sans);
    font-style: normal;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent-deep);
    margin-right: 8px;
    vertical-align: 2px;
  }
  .compare-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  .compare-col {
    border: 1px solid var(--rule);
    background: rgba(255,252,240,0.45);
    padding: 22px 24px;
    border-radius: 2px;
    position: relative;
  }
  .compare-col.with {
    border-color: var(--ink);
    background: rgba(255,252,240,0.85);
    box-shadow: 0 2px 0 rgba(0,0,0,0.04);
  }
  .compare-label {
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .compare-label .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--ink-faint);
  }
  .compare-col.with .compare-label { color: var(--accent-deep); }
  .compare-col.with .compare-label .dot { background: var(--accent); }
  .compare-col p {
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.6;
    color: var(--ink-soft);
    margin: 0 0 12px 0;
  }
  .compare-col.without p { color: var(--ink-muted); }
  .compare-col ol, .compare-col ul {
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.55;
    color: var(--ink-soft);
    padding-left: 22px;
    margin: 8px 0 14px 0;
  }
  .compare-col li { margin-bottom: 8px; }
  .compare-col li b { color: var(--ink); font-weight: 600; }
  .citation {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px dashed var(--rule);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-muted);
    line-height: 1.5;
  }
  .citation::before {
    content: "Cited — ";
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent-deep);
    margin-right: 4px;
  }

  /* ============================ Slide 6 — built on the brain (4 tiles) ============================ */
  .tiles {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    margin-top: 12px;
  }
  .tile-frame {
    display: flex;
    flex-direction: column;
  }
  .tile-art {
    aspect-ratio: 4 / 3;
    border: 1.5px solid var(--ink);
    background: #fff;
    padding: 0;
    position: relative;
    overflow: hidden;
  }
  .tile-art::before, .tile-art::after {
    content: "";
    position: absolute;
    width: 12px; height: 12px;
    border: 1.5px solid var(--ink);
  }
  .tile-art::before { top: -6px; left: -6px; border-right: 0; border-bottom: 0; }
  .tile-art::after { bottom: -6px; right: -6px; border-left: 0; border-top: 0; }
  .tile-placeholder {
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
    color: var(--ink-muted);
    font-family: var(--serif);
    font-style: italic;
    font-size: 13px;
    text-align: center;
    background:
      repeating-linear-gradient(
        45deg,
        transparent,
        transparent 8px,
        rgba(60, 50, 30, 0.05) 8px,
        rgba(60, 50, 30, 0.05) 9px
      );
    padding: 20px;
  }
  .tile-placeholder .ph-icon { font-size: 28px; color: var(--ink-faint); }
  .tile-caption {
    font-family: var(--serif);
    font-size: 14px;
    font-style: italic;
    color: var(--ink-soft);
    margin-top: 14px;
    line-height: 1.45;
  }
  .tile-caption b {
    font-family: var(--sans);
    font-style: normal;
    font-weight: 600;
    font-size: 13px;
    color: var(--ink);
    display: block;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .tile-closing {
    font-family: var(--serif);
    font-style: italic;
    font-size: 18px;
    color: var(--ink);
    text-align: center;
    margin-top: 48px;
    padding: 24px 0 0 0;
    border-top: 1px solid var(--rule);
    max-width: 640px;
    margin-left: auto;
    margin-right: auto;
  }

  /* ============================ Slide 6c — receipts (prompts + artifacts) ============================ */
  .receipts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-auto-rows: auto;
    gap: 48px 36px;
    margin-top: 28px;
  }
  .receipt {
    display: grid;
    grid-template-rows: subgrid;
    grid-row: span 3;
    gap: 12px;
  }
  .receipt-prompt {
    font-family: var(--serif);
    font-style: italic;
    font-size: 17px;
    line-height: 1.4;
    color: var(--ink);
    padding: 14px 16px;
    background: rgba(255, 252, 240, 0.65);
    border-left: 3px solid var(--accent);
  }
  .receipt-prompt::before {
    content: "Prompt — ";
    font-family: var(--sans);
    font-style: normal;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent-deep);
    margin-right: 8px;
    vertical-align: 2px;
  }
  .receipt-art {
    border: 1.5px solid var(--ink);
    background: #fff;
    position: relative;
    overflow: hidden;
    aspect-ratio: 16 / 10;
  }
  .receipt-art::before, .receipt-art::after {
    content: "";
    position: absolute;
    width: 12px; height: 12px;
    border: 1.5px solid var(--ink);
  }
  .receipt-art::before { top: -6px; left: -6px; border-right: 0; border-bottom: 0; }
  .receipt-art::after { bottom: -6px; right: -6px; border-left: 0; border-top: 0; }
  .receipt-art img { display: block; width: 100%; height: 100%; object-fit: cover; object-position: top left; }
  .receipt-art .tile-placeholder { aspect-ratio: auto; height: 100%; }
  .receipt-caption {
    font-family: var(--sans);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-muted);
  }
  .receipt-caption b {
    font-weight: 700;
    color: var(--ink);
    margin-right: 8px;
  }

  /* ============================ Slide 9 — homage ============================ */
  .homage {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 64px;
    align-items: start;
    margin-top: 12px;
  }
  .portrait-frame {
    border: 1.5px solid var(--ink);
    aspect-ratio: 1024 / 1198;
    position: relative;
    background: #fff;
    overflow: hidden;
  }
  .portrait-frame::before, .portrait-frame::after {
    content: "";
    position: absolute;
    width: 12px; height: 12px;
    border: 1.5px solid var(--ink);
  }
  .portrait-frame::before { top: -6px; left: -6px; border-right: 0; border-bottom: 0; }
  .portrait-frame::after { bottom: -6px; right: -6px; border-left: 0; border-top: 0; }
  .portrait-frame img { object-fit: cover; }
  .portrait-name {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 500;
    color: var(--ink);
    margin: 22px 0 4px 0;
    line-height: 1.15;
  }
  .portrait-name .hl-strong { font-weight: 500; }
  .portrait-years {
    font-family: var(--serif);
    font-style: italic;
    font-size: 16px;
    color: var(--ink-muted);
    margin: 0 0 18px 0;
  }
  .portrait-acronym {
    font-family: var(--mono);
    font-size: 11.5px;
    line-height: 1.5;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-muted);
    padding: 12px 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    margin: 0 0 18px 0;
  }
  .portrait-acronym b {
    color: var(--ink);
    font-weight: 700;
  }
  .portrait-link {
    font-family: var(--sans);
    font-size: 13px;
    letter-spacing: 0.04em;
  }
  .portrait-link a {
    color: var(--accent-deep);
    text-decoration: none;
    border-bottom: 1px solid currentColor;
    padding-bottom: 1px;
    transition: color 0.15s ease;
  }
  .portrait-link a:hover {
    color: var(--ink);
  }
  .homage-story {
    display: flex;
    flex-direction: column;
    gap: 36px;
  }
  .homage-block-title {

// ------------------ Index rail (jump links) ------------------
function IndexRail() {
  const [active, setActive] = useState("1");
  const [ids, setIds] = useState([]);
  useEffect(() => {
    const slides = Array.from(document.querySelectorAll("section.page"));
    setIds(slides.map((s) => s.id.replace("slide-", "")));
    const handler = () => {
      let current = slides[0]?.id?.replace("slide-", "") || "1";
      slides.forEach((s) => {
        const r = s.getBoundingClientRect();
        if (r.top < window.innerHeight / 2) current = s.id.replace("slide-", "");
      });
      setActive(current);
    };
    handler();
    window.addEventListener("scroll", handler, { passive: true });
    return () => window.removeEventListener("scroll", handler);
  }, []);
  return (
    <nav className="index-rail" aria-label="Slide index">
          {ids.map((i) =>
      <a key={i} href={`#slide-${i}`} className={active === i ? "active" : ""} title={`Slide ${i}`}>
              {i}
            </a>
      )}
        </nav>);

}

// ------------------ Tweaks ------------------
function applyTweaks(t) {
  const root = document.documentElement;
  // Accent hue — derive accent + wash + deep from a single hue
  const h = t.accentHue;
  root.style.setProperty("--accent", `hsl(${h}, 86%, 56%)`);
  root.style.setProperty("--accent-wash", `hsla(${h}, 86%, 56%, 0.32)`);
  root.style.setProperty("--accent-deep", `hsl(${h}, 76%, 36%)`);

  // Dot grid
  root.style.setProperty("--grid-dot", t.showDotGrid ? "rgba(60, 50, 30, 0.18)" : "transparent");

  // Font pairing
  const pairs = {
    "source-inter": { serif: '"Source Serif 4", Georgia, serif', sans: '"Inter", -apple-system, sans-serif' },
    "playfair-inter": { serif: '"Playfair Display", Georgia, serif', sans: '"Inter", sans-serif' },
    "lora-ibm": { serif: '"Lora", Georgia, serif', sans: '"IBM Plex Sans", sans-serif' },
    "fraunces-work": { serif: '"Fraunces", Georgia, serif', sans: '"Work Sans", sans-serif' }
  };
  const pair = pairs[t.fontPair] || pairs["source-inter"];
  root.style.setProperty("--serif", pair.serif);
  root.style.setProperty("--sans", pair.sans);

  // Inject extra font when needed
  const id = "tweak-fonts-extra";
  let link = document.getElementById(id);
  const families = {
    "playfair-inter": "Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600",
    "lora-ibm": "Lora:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;500;600",
    "fraunces-work": "Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Work+Sans:wght@300;400;500;600"
  };
  if (families[t.fontPair]) {
    if (!link) {
      link = document.createElement("link");
      link.id = id;link.rel = "stylesheet";
      document.head.appendChild(link);
    }
    link.href = `https://fonts.googleapis.com/css2?family=${families[t.fontPair]}&display=swap`;
  }

  // Paper warmth — 0 = pure white, 1 = full cream
  const w = t.paperWarmth;
  const r = Math.round(255 - w * 8);
  const g = Math.round(255 - w * 14);
  const b = Math.round(255 - w * 28);
  root.style.setProperty("--paper", `rgb(${r}, ${g}, ${b})`);
}

function TweaksPanelMount() {
  // useTweaks comes from tweaks-panel.jsx
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  useEffect(() => {applyTweaks(tweaks);}, [tweaks]);
  const T = window;
  return (
    <T.TweaksPanel title="Tweaks">
          <T.TweakSection title="Accent">
            <T.TweakSlider
          label="Accent hue"
          value={tweaks.accentHue}
          min={0} max={360} step={1}
          onChange={(v) => setTweak("accentHue", v)}
          suffix="°" />
        
          </T.TweakSection>
          <T.TweakSection title="Paper">
            <T.TweakToggle
          label="Show dot grid"
          value={tweaks.showDotGrid}
          onChange={(v) => setTweak("showDotGrid", v)} />
        
            <T.TweakSlider
          label="Paper warmth"
          value={tweaks.paperWarmth}
          min={0} max={1} step={0.05}
          onChange={(v) => setTweak("paperWarmth", v)} />
        
          </T.TweakSection>
          <T.TweakSection title="Type">
            <T.TweakSelect
          label="Font pairing"
          value={tweaks.fontPair}
          onChange={(v) => setTweak("fontPair", v)}
          options={[
          { value: "source-inter", label: "Source Serif 4 + Inter" },
          { value: "playfair-inter", label: "Playfair Display + Inter" },
          { value: "lora-ibm", label: "Lora + IBM Plex Sans" },
          { value: "fraunces-work", label: "Fraunces + Work Sans" }]
          } />
        
          </T.TweakSection>
        </T.TweaksPanel>);

}
